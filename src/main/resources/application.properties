# ==========================================
# CONFIGURACIÓN DE LA BASE DE DATOS (MySQL)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/studysync?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ==========================================
# 'update' sincroniza las Entities con la BD (añade lo nuevo automáticamente)
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL en la consola (imprescindible para ver qué hace Hibernate)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto actualizado para versiones modernas de MySQL (8+)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Puerto de la aplicación
server.port=8080

# ==========================================
# CONFIGURACIÓN DE JACKSON (JSON)
# ==========================================
# Esto evita errores si intentas enviar una fecha en un formato que no reconoce
spring.jackson.serialization.write-dates-as-timestamps=false


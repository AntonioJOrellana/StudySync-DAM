# ==========================================
# CONFIGURACIÓN DE LA BASE DE DATOS (MySQL)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/studysync?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Puerto de la aplicación
server.port=8080

# ==========================================
# CONFIGURACIÓN DE JACKSON (JSON)
# ==========================================
spring.jackson.serialization.write-dates-as-timestamps=false

# ==========================================
# CONFIGURACIÓN DE GEMINI AI (Manual)
# ==========================================
# Estas variables se inyectan desde el launch.json

# Opcional: Si quieres que por defecto use uno si no encuentra la variable
# GEMINI_MODEL=gemini-3-flash-preview